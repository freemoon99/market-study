databases:
  - name: market-study-db
    plan: free
    databaseName: marketstudy
    user: marketstudy

services:
  - type: web
    name: market-study
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: market-study-db
          property: connectionString
